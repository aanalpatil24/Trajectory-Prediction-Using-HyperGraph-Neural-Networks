# Model Configuration
# HGNN Trajectory Prediction

# Architecture
input_dim: 2
hidden_dim: 128
output_dim: 2
num_hgnn_layers: 2
num_gru_layers: 2
num_heads: 4
dropout: 0.1

# Sequence Configuration
obs_len: 8
pred_len: 12

# Social Interaction (DBSCAN)
dbscan_eps: 2.0
dbscan_min_samples: 2
use_dynamic_hypergraph: true
hypergraph_weighted: true

# Training Configuration
batch_size: 32
num_epochs: 100
learning_rate: 0.001
weight_decay: 0.0001
gradient_clip: 1.0
teacher_forcing_ratio: 0.5

# Learning Rate Scheduling
lr_scheduler: "reduce_on_plateau"
lr_factor: 0.5
lr_patience: 5

# Data Augmentation
augmentation_enabled: true
augmentation_prob: 0.5
reverse_prob: 0.3
missing_data_prob: 0.1
noise_scale: 0.01

# Dataset Configuration
dataset_name: "synthetic"
num_train_samples: 5000
num_val_samples: 1000
min_agents: 5
max_agents: 20

# System Configuration
device: "cuda"
num_workers: 4
pin_memory: true
seed: 42

# Logging & Checkpointing
log_dir: "outputs/logs"
checkpoint_dir: "checkpoints"
save_every: 10

# Evaluation Metrics
collision_threshold: 0.1
success_threshold: 0.5
